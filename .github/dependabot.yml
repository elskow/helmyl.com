version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    exclude-paths:
      - 'packages/**'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore(deps)'
    labels:
      - 'dependencies'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore(deps)'
    labels:
      - 'dependencies'
