name: Dependabot auto-merge
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && contains(github.event.pull_request.labels.*.name, 'automerge')
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
      - name: Enable auto-merge for patch and minor updates
        if: steps.metadata.outputs['update-type'] == 'version-update:semver-patch' || steps.metadata.outputs['update-type'] == 'version-update:semver-minor'
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Skip auto-merge for non patch/minor updates
        if: steps.metadata.outputs['update-type'] != 'version-update:semver-patch' && steps.metadata.outputs['update-type'] != 'version-update:semver-minor'
        run: 'echo "Skipping auto-merge for update type: $UPDATE_TYPE"'
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs['update-type'] }}
